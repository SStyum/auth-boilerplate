server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: every non-asset URL serves index.html so react-router
  # can pick up the client-side path.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets aggressively; index.html is always fresh.
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
